<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yosef Gunawan | Digital Product & Automation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#1A1A1A;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:430px;
    background:#fff;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:20px;
}

h1{
    font-size:30px;
    margin-bottom:10px;
}

.role{
    color:#666;
    line-height:1.6;
    margin-bottom:25px;
    min-height:50px;
}

.switch{
    display:flex;
    background:#f2f2f2;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:25px;
}

.switch button{
    flex:1;
    border:none;
    padding:14px;
    cursor:pointer;
    background:transparent;
    font-weight:bold;
    transition:.2s;
}

.switch button.active{
    background:#9100FD;
    color:white;
}

.button{
    display:block;
    text-decoration:none;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    font-weight:bold;
    transition:.2s;
}

.view{
    background:#34A853;
    color:white;
}

.download{
    background:#9100FD;
    color:white;
}

.button:hover{
    transform:translateY(-2px);
}
</style>

</head>
<body>

<div class="card">

<img src="pp-yosef.png" alt="Yosef Gunawan">

<h1>Yosef Gunawan</h1>

<div class="switch">
    <button id="uiuxBtn" class="active" onclick="changeRole('uiux')">
        UI/UX Designer
    </button>

    <button id="rpaBtn" onclick="changeRole('rpa')">
        RPA Developer
    </button>
</div>

<p class="role" id="description">
UI/UX Designer passionate about crafting intuitive digital experiences and solving real user problems.
</p>

<a id="viewBtn" class="button view" href="portfolio.pdf" target="_blank">
View Portfolio
</a>

<a id="downloadBtn" class="button download" href="portfolio.pdf" download>
Download PDF
</a>

</div>

<script>

function changeRole(role){

    const uiuxBtn=document.getElementById("uiuxBtn");
    const rpaBtn=document.getElementById("rpaBtn");

    const description=document.getElementById("description");
    const viewBtn=document.getElementById("viewBtn");
    const downloadBtn=document.getElementById("downloadBtn");

    uiuxBtn.classList.remove("active");
    rpaBtn.classList.remove("active");

    if(role==="uiux"){

        uiuxBtn.classList.add("active");

        description.innerHTML=
        "UI/UX Designer passionate about crafting intuitive digital experiences and solving real user problems.";

        viewBtn.href="portfolio.pdf";
        downloadBtn.href="portfolio.pdf";

        viewBtn.innerHTML="View Portfolio";
        downloadBtn.innerHTML="Download PDF";

    }else{

        rpaBtn.classList.add("active");

        description.innerHTML=
        "Automation Developer with 4+ years of experience building enterprise automation using UiPath, C#, OCR, APIs, and internal RPA frameworks.";

        /* Ganti rpa.pdf jika nanti sudah punya portfolio RPA */
        viewBtn.href="portfolio.pdf";
        downloadBtn.href="portfolio.pdf";

        viewBtn.innerHTML="View RPA Profile";
        downloadBtn.innerHTML="Download PDF";

    }

}

</script>

</body>
</html>
