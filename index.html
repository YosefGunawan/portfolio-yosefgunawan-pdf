<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yosef Gunawan | UI/UX Designer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f7f7f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:20px;
}

h1{
    font-size:30px;
    margin-bottom:8px;
}

p{
    color:#666;
    line-height:1.6;
    margin-bottom:30px;
}

.button{
    display:block;
    text-decoration:none;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    font-weight:bold;
    transition:.2s;
}

.view{
    background:#111;
    color:white;
}

.download{
    background:#ececec;
    color:#111;
}

.button:hover{
    transform:translateY(-2px);
}
</style>

</head>
<body>

<div class="card">

<!-- kalau tidak pakai foto, hapus baris img -->
<img src="pp-yosef.png" alt="Yosef Gunawan">

<h1>Yosef Gunawan</h1>

<p>
UI/UX Designer passionate about crafting intuitive digital experiences and solving real user problems.
</p>

<a class="button view" href="portfolio.pdf" target="_blank">
View Portfolio
</a>

<a class="button download" href="portfolio.pdf" download>
Download PDF
</a>

</div>

</body>
</html>
